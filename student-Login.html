<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login | OMM GANAPATI INSTITUTE OF INFORMATION & TECHNOLOGY</title>

<link rel="stylesheet" href="../css/student.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    margin:0;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-box{
    width:400px;
    max-width:95%;
    background:#fff;
    padding:35px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
}

.logo img{
    width:90px;
    margin-bottom:10px;
}

.logo h2{
    color:#003366;
    margin:5px 0;
}

.logo p{
    color:#666;
    font-size:14px;
}

.input-group{
    margin:15px 0;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

.btn-login{
    width:100%;
    padding:12px;
    background:#003366;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.btn-login:hover{
    background:#00509e;
}

.footer{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.footer a{
    text-decoration:none;
    color:#003366;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="omgiit.png" alt="Logo">

<h2>Omm Ganapati Institute of Information & Technology</h2>

<h3> Student Login</h3>

</div>

<form action="login.php" method="POST">

<div class="input-group">

<label>Admission Number</label>

<input
type="text"
name="admission_no"
placeholder="OMGIIT20260001"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

</div>

<button
type="submit"
class="btn-login">

<i class="fas fa-sign-in-alt"></i>

Student Login

</button>

</form>

<div class="footer">

<p>

<a href="../admission.html">

New Admission?

</a>

</p>

<p>

© 2026 OMM GANAPATI INSTITUTE OF INFORMATION & TECHNOLOGY

</p>

</div>

</div>

</body>
</html>
